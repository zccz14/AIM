openapi: 3.1.0
info:
  title: CZ-Stack Contract
  version: 0.0.0
servers:
  - url: https://dev.api.cz-stack.local
    description: Development
  - url: https://staging.api.cz-stack.local
    description: Staging
  - url: https://api.cz-stack.local
    description: Production
paths:
  /db/sqlite:
    get:
      operationId: getDbSqlite
      summary: Download the current AIM SQLite database file
      responses:
        "200":
          description: AIM SQLite database file
          content:
            application/vnd.sqlite3:
              schema:
                type: string
                format: binary
  /health:
    get:
      operationId: getHealth
      summary: Read service health status
      responses:
        "200":
          description: Healthy response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Unhealthy response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthError"
  /opencode/models:
    get:
      operationId: listOpenCodeModels
      summary: List OpenCode provider and model combinations
      responses:
        "200":
          description: OpenCode provider and model combinations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeModelsResponse"
        "503":
          description: OpenCode models unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /opencode/sessions:
    get:
      operationId: listOpenCodeSessions
      summary: List AIM-controlled OpenCode session promises
      parameters:
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OpenCodeSessionState"
      responses:
        "200":
          description: OpenCode session promise list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeSessionListResponse"
        "400":
          description: Invalid OpenCode session filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOpenCodeSession
      summary: Create an AIM-controlled OpenCode session promise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenCodeSessionRequest"
      responses:
        "201":
          description: Created OpenCode session promise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeSession"
        "400":
          description: Invalid OpenCode session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /opencode/sessions/continue_pending:
    post:
      operationId: continuePendingOpenCodeSessions
      summary: Continue all pending sessions
      responses:
        "200":
          description: Per-session continuation push results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeSessionContinueBulkResponse"
  /opencode/sessions/{sessionId}:
    get:
      operationId: getOpenCodeSessionById
      summary: Read an AIM-controlled OpenCode session promise
      parameters:
        - $ref: "#/components/parameters/OpenCodeSessionIdPathParameter"
      responses:
        "200":
          description: OpenCode session promise detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeSession"
        "404":
          description: OpenCode session promise not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchOpenCodeSessionById
      summary: Replace continuation prompt for a pending OpenCode session promise
      parameters:
        - $ref: "#/components/parameters/OpenCodeSessionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOpenCodeSessionRequest"
      responses:
        "200":
          description: Updated OpenCode session promise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeSession"
        "400":
          description: Invalid OpenCode session patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: OpenCode session promise not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: OpenCode session promise is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /opencode/sessions/{sessionId}/continue:
    post:
      operationId: continueOpenCodeSessionById
      summary: Continue
      parameters:
        - $ref: "#/components/parameters/OpenCodeSessionIdPathParameter"
      responses:
        "200":
          description: Continuation push result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeSessionContinueResult"
        "404":
          description: OpenCode session promise not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /opencode/sessions/{sessionId}/resolve:
    post:
      operationId: resolveOpenCodeSessionById
      summary: Resolve an AIM-controlled OpenCode session promise
      parameters:
        - $ref: "#/components/parameters/OpenCodeSessionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenCodeSessionSettleRequest"
      responses:
        "204":
          description: OpenCode session promise resolved
        "400":
          description: Invalid OpenCode session settlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: OpenCode session promise not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /opencode/sessions/{sessionId}/reject:
    post:
      operationId: rejectOpenCodeSessionById
      summary: Reject an AIM-controlled OpenCode session promise
      parameters:
        - $ref: "#/components/parameters/OpenCodeSessionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenCodeSessionSettleRequest"
      responses:
        "204":
          description: OpenCode session promise rejected
        "400":
          description: Invalid OpenCode session settlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: OpenCode session promise not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    post:
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid project payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listProjects
      summary: List projects
      responses:
        "200":
          description: Project collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
  /projects/{projectId}:
    patch:
      operationId: patchProjectById
      summary: Update a project
      parameters:
        - $ref: "#/components/parameters/ProjectIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid project patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProjectById
      summary: Delete a project
      parameters:
        - $ref: "#/components/parameters/ProjectIdPathParameter"
      responses:
        "204":
          description: Project deleted
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{projectId}/optimizer/status:
    get:
      operationId: getProjectOptimizerStatus
      summary: Read project optimizer runtime status
      parameters:
        - $ref: "#/components/parameters/ProjectIdPathParameter"
      responses:
        "200":
          description: Project optimizer runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOptimizerStatusResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{projectId}/director/clarifications:
    get:
      operationId: listDirectorClarifications
      summary: List Director clarification and adjustment requests for a project
      parameters:
        - $ref: "#/components/parameters/ProjectIdPathParameter"
      responses:
        "200":
          description: Director clarification collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectorClarificationListResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createDirectorClarification
      summary: Record a Director clarification or adjustment request
      parameters:
        - $ref: "#/components/parameters/ProjectIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectorClarificationRequest"
      responses:
        "201":
          description: Created Director clarification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectorClarification"
        "400":
          description: Invalid Director clarification payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks:
    post:
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTasks
      summary: List tasks
      parameters:
        - $ref: "#/components/parameters/TaskStatusQueryParameter"
        - $ref: "#/components/parameters/TaskDoneQueryParameter"
        - $ref: "#/components/parameters/TaskSessionIdQueryParameter"
      responses:
        "200":
          description: Task collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "400":
          description: Invalid task filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}:
    get:
      operationId: getTaskById
      summary: Read a task
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchTaskById
      summary: Update a task
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTaskById
      summary: Delete a task
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "204":
          description: Task deleted
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/worktree_path:
    put:
      operationId: putTaskWorktreePathById
      summary: Update a task worktree path
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskWorktreePathRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task worktree path payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/pull_request_url:
    put:
      operationId: putTaskPullRequestUrlById
      summary: Update a task pull request URL
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskPullRequestUrlRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task pull request URL payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/dependencies:
    put:
      operationId: putTaskDependenciesById
      summary: Update task dependencies
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskDependenciesRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task dependencies payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/pull_request_status:
    get:
      operationId: getTaskPullRequestStatusById
      summary: Classify task pull request follow-up state
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "200":
          description: Pull request follow-up status and recovery guidance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskPullRequestStatusResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/resolve:
    post:
      operationId: resolveTaskById
      summary: Resolve a task with a result
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskResultRequest"
      responses:
        "204":
          description: Task resolved
        "400":
          description: Invalid task result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/reject:
    post:
      operationId: rejectTaskById
      summary: Reject a task with a result
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskResultRequest"
      responses:
        "204":
          description: Task rejected
        "400":
          description: Invalid task result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/spec:
    get:
      operationId: getTaskSpecById
      summary: Read a task spec markdown document
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "200":
          description: Task spec markdown
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/batch:
    post:
      operationId: createTaskBatch
      summary: Apply an atomic batch of task operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBatchRequest"
      responses:
        "200":
          description: Applied task batch operations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBatchResponse"
        "400":
          description: Invalid task batch payload or operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dimensions:
    post:
      operationId: createDimension
      summary: Create a project evaluation dimension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDimensionRequest"
      responses:
        "201":
          description: Created dimension
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dimension"
        "400":
          description: Invalid dimension payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listDimensions
      summary: List dimensions for a project
      parameters:
        - $ref: "#/components/parameters/ProjectIdQueryParameter"
      responses:
        "200":
          description: Dimension collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DimensionListResponse"
        "400":
          description: Invalid dimension filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dimensions/{dimensionId}:
    get:
      operationId: getDimensionById
      summary: Read a dimension
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      responses:
        "200":
          description: Dimension detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dimension"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchDimensionById
      summary: Update a dimension
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDimensionRequest"
      responses:
        "200":
          description: Updated dimension
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dimension"
        "400":
          description: Invalid dimension patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDimensionById
      summary: Delete a dimension and its evaluations
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      responses:
        "204":
          description: Dimension deleted
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dimensions/{dimensionId}/evaluations:
    get:
      operationId: listDimensionEvaluations
      summary: List append-only evaluations for a dimension
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      responses:
        "200":
          description: Dimension evaluation collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DimensionEvaluationListResponse"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createDimensionEvaluation
      summary: Append a dimension evaluation
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDimensionEvaluationRequest"
      responses:
        "201":
          description: Created dimension evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DimensionEvaluation"
        "400":
          description: Invalid dimension evaluation payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TaskIdPathParameter:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TaskStatusQueryParameter:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - processing
          - resolved
          - rejected
    TaskDoneQueryParameter:
      name: done
      in: query
      required: false
      schema:
        type: boolean
    TaskSessionIdQueryParameter:
      name: session_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    OpenCodeSessionIdPathParameter:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ProjectIdPathParameter:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ProjectIdQueryParameter:
      name: project_id
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    BulkIdPathParameter:
      name: bulkId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    DimensionIdPathParameter:
      name: dimensionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Health status reported by the service
          enum:
            - ok
    HealthError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code
          enum:
            - UNAVAILABLE
        message:
          type: string
          description: Human-readable error detail
          minLength: 1
    Project:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - git_origin_url
        - global_provider_id
        - global_model_id
        - optimizer_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 1
        git_origin_url:
          type: string
          minLength: 1
        global_provider_id:
          type: string
          minLength: 1
        global_model_id:
          type: string
          minLength: 1
        optimizer_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - git_origin_url
        - global_provider_id
        - global_model_id
      properties:
        name:
          type: string
          minLength: 1
        git_origin_url:
          type: string
          minLength: 1
        global_provider_id:
          type: string
          minLength: 1
        global_model_id:
          type: string
          minLength: 1
        optimizer_enabled:
          type: boolean
    PatchProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        git_origin_url:
          type: string
          minLength: 1
        global_provider_id:
          type: string
          minLength: 1
        global_model_id:
          type: string
          minLength: 1
        optimizer_enabled:
          type: boolean
