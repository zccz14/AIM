openapi: 3.1.0
info:
  title: CZ-Stack Contract
  version: 0.0.0
servers:
  - url: https://dev.api.cz-stack.local
    description: Development
  - url: https://staging.api.cz-stack.local
    description: Staging
  - url: https://api.cz-stack.local
    description: Production
paths:
  /health:
    get:
      operationId: getHealth
      summary: Read service health status
      responses:
        "200":
          description: Healthy response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Unhealthy response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthError"
  /opencode/models:
    get:
      operationId: listOpenCodeModels
      summary: List OpenCode provider and model combinations
      responses:
        "200":
          description: OpenCode provider and model combinations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCodeModelsResponse"
        "503":
          description: OpenCode models unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /optimizer/status:
    get:
      operationId: getOptimizerStatus
      summary: Read AIM optimizer runtime status
      responses:
        "200":
          description: Optimizer runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizerStatusResponse"
  /optimizer/start:
    post:
      operationId: startOptimizer
      summary: Start AIM optimizer runtime
      responses:
        "200":
          description: Optimizer runtime status after start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizerStatusResponse"
  /optimizer/stop:
    post:
      operationId: stopOptimizer
      summary: Stop AIM optimizer runtime
      responses:
        "200":
          description: Optimizer runtime status after stop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizerStatusResponse"
  /tasks:
    post:
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTasks
      summary: List tasks
      parameters:
        - $ref: "#/components/parameters/TaskStatusQueryParameter"
        - $ref: "#/components/parameters/TaskDoneQueryParameter"
        - $ref: "#/components/parameters/TaskSessionIdQueryParameter"
      responses:
        "200":
          description: Task collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "400":
          description: Invalid task filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}:
    get:
      operationId: getTaskById
      summary: Read a task
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchTaskById
      summary: Update a task
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTaskById
      summary: Delete a task
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "204":
          description: Task deleted
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/worktree_path:
    put:
      operationId: putTaskWorktreePathById
      summary: Update a task worktree path
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskWorktreePathRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task worktree path payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/pull_request_url:
    put:
      operationId: putTaskPullRequestUrlById
      summary: Update a task pull request URL
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskPullRequestUrlRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task pull request URL payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/dependencies:
    put:
      operationId: putTaskDependenciesById
      summary: Update task dependencies
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskDependenciesRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid task dependencies payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/resolve:
    post:
      operationId: resolveTaskById
      summary: Resolve a task with a result
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskResultRequest"
      responses:
        "204":
          description: Task resolved
        "400":
          description: Invalid task result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/reject:
    post:
      operationId: rejectTaskById
      summary: Reject a task with a result
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskResultRequest"
      responses:
        "204":
          description: Task rejected
        "400":
          description: Invalid task result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/spec:
    get:
      operationId: getTaskSpecById
      summary: Read a task spec markdown document
      parameters:
        - $ref: "#/components/parameters/TaskIdPathParameter"
      responses:
        "200":
          description: Task spec markdown
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /manager_reports:
    post:
      operationId: createManagerReport
      summary: Create a manager report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManagerReportRequest"
      responses:
        "201":
          description: Created manager report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerReport"
        "400":
          description: Invalid manager report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Manager report already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listManagerReports
      summary: List manager reports for a project
      parameters:
        - $ref: "#/components/parameters/ProjectPathQueryParameter"
      responses:
        "200":
          description: Manager report collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerReportListResponse"
        "400":
          description: Invalid manager report filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /manager_reports/{reportId}:
    get:
      operationId: getManagerReportById
      summary: Read a manager report
      parameters:
        - $ref: "#/components/parameters/ReportIdPathParameter"
        - $ref: "#/components/parameters/ProjectPathQueryParameter"
      responses:
        "200":
          description: Manager report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerReport"
        "400":
          description: Invalid manager report lookup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Manager report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /task_write_bulks:
    post:
      operationId: createTaskWriteBulk
      summary: Create a coordinator task write bulk intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskWriteBulkRequest"
      responses:
        "201":
          description: Created task write bulk intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWriteBulk"
        "400":
          description: Invalid task write bulk payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Task write bulk already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTaskWriteBulks
      summary: List coordinator task write bulk intents for a project
      parameters:
        - $ref: "#/components/parameters/ProjectPathQueryParameter"
      responses:
        "200":
          description: Task write bulk collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWriteBulkListResponse"
        "400":
          description: Invalid task write bulk filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /task_write_bulks/{bulkId}:
    get:
      operationId: getTaskWriteBulkById
      summary: Read a coordinator task write bulk intent
      parameters:
        - $ref: "#/components/parameters/BulkIdPathParameter"
        - $ref: "#/components/parameters/ProjectPathQueryParameter"
      responses:
        "200":
          description: Task write bulk detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWriteBulk"
        "400":
          description: Invalid task write bulk lookup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task write bulk not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dimensions:
    post:
      operationId: createDimension
      summary: Create a project evaluation dimension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDimensionRequest"
      responses:
        "201":
          description: Created dimension
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dimension"
        "400":
          description: Invalid dimension payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listDimensions
      summary: List dimensions for a project
      parameters:
        - $ref: "#/components/parameters/ProjectPathQueryParameter"
      responses:
        "200":
          description: Dimension collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DimensionListResponse"
        "400":
          description: Invalid dimension filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dimensions/{dimensionId}:
    get:
      operationId: getDimensionById
      summary: Read a dimension
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      responses:
        "200":
          description: Dimension detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dimension"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchDimensionById
      summary: Update a dimension
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDimensionRequest"
      responses:
        "200":
          description: Updated dimension
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dimension"
        "400":
          description: Invalid dimension patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDimensionById
      summary: Delete a dimension and its evaluations
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      responses:
        "204":
          description: Dimension deleted
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dimensions/{dimensionId}/evaluations:
    get:
      operationId: listDimensionEvaluations
      summary: List append-only evaluations for a dimension
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      responses:
        "200":
          description: Dimension evaluation collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DimensionEvaluationListResponse"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createDimensionEvaluation
      summary: Append a dimension evaluation
      parameters:
        - $ref: "#/components/parameters/DimensionIdPathParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDimensionEvaluationRequest"
      responses:
        "201":
          description: Created dimension evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DimensionEvaluation"
        "400":
          description: Invalid dimension evaluation payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dimension not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TaskIdPathParameter:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TaskStatusQueryParameter:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - processing
          - resolved
          - rejected
    TaskDoneQueryParameter:
      name: done
      in: query
      required: false
      schema:
        type: boolean
    TaskSessionIdQueryParameter:
      name: session_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    ProjectPathQueryParameter:
      name: project_path
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    ReportIdPathParameter:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    BulkIdPathParameter:
      name: bulkId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    DimensionIdPathParameter:
      name: dimensionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Health status reported by the service
          enum:
            - ok
    HealthError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code
          enum:
            - UNAVAILABLE
        message:
          type: string
          description: Human-readable error detail
          minLength: 1
    Task:
      type: object
      additionalProperties: false
      required:
        - task_id
        - title
        - task_spec
        - project_id
        - project_path
        - developer_provider_id
        - developer_model_id
        - result
        - session_id
        - worktree_path
        - pull_request_url
        - dependencies
        - done
        - status
        - created_at
        - updated_at
      properties:
        task_id:
          type: string
          minLength: 1
          readOnly: true
        task_spec:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        project_id:
          type: string
          minLength: 1
        project_path:
          type: string
          minLength: 1
        developer_provider_id:
          type: string
          minLength: 1
        developer_model_id:
          type: string
          minLength: 1
        result:
          type: string
        session_id:
          type:
            - string
            - "null"
        worktree_path:
          type:
            - string
            - "null"
        pull_request_url:
          type:
            - string
            - "null"
        dependencies:
          type: array
          items:
            type: string
            minLength: 1
        done:
          type: boolean
          readOnly: true
        status:
          type: string
          enum:
            - processing
            - resolved
            - rejected
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - task_spec
        - project_id
      properties:
        title:
          type: string
          minLength: 1
        task_spec:
          type: string
          minLength: 1
        project_id:
          type: string
          minLength: 1
        dependencies:
          type: array
          items:
            type: string
            minLength: 1
        result:
          type: string
          default: ""
        session_id:
          type:
            - string
            - "null"
        worktree_path:
          type:
            - string
            - "null"
        pull_request_url:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - processing
            - resolved
            - rejected
    PatchTaskRequest:
      type: object
      additionalProperties: false
      properties:
        task_spec:
          type: string
          minLength: 1
        session_id:
          type:
            - string
            - "null"
        worktree_path:
          type:
            - string
            - "null"
        pull_request_url:
          type:
            - string
            - "null"
        dependencies:
          type: array
          items:
            type: string
            minLength: 1
        result:
          type: string
        status:
          type: string
          enum:
            - processing
            - resolved
            - rejected
    TaskWorktreePathRequest:
      type: object
      additionalProperties: false
      required:
        - worktree_path
      properties:
        worktree_path:
          type:
            - string
            - "null"
    TaskPullRequestUrlRequest:
      type: object
      additionalProperties: false
      required:
        - pull_request_url
      properties:
        pull_request_url:
          type:
            - string
            - "null"
    TaskDependenciesRequest:
      type: object
      additionalProperties: false
      required:
        - dependencies
      properties:
        dependencies:
          type: array
          items:
            type: string
            minLength: 1
    TaskResultRequest:
      type: object
      additionalProperties: false
      required:
        - result
      properties:
        result:
          type: string
          minLength: 1
          pattern: ^(?!\s*$).+
    TaskListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Task"
    SourceMetadataEntry:
      type: object
      additionalProperties: false
      required:
        - key
        - value
      properties:
        key:
          type: string
          minLength: 1
        value:
          type: string
    ManagerReport:
      type: object
      additionalProperties: false
      required:
        - project_path
        - report_id
        - content_markdown
        - baseline_ref
        - source_metadata
        - created_at
        - updated_at
      properties:
        project_path:
          type: string
          minLength: 1
        report_id:
          type: string
          minLength: 1
        content_markdown:
          type: string
          minLength: 1
        baseline_ref:
          type:
            - string
            - "null"
        source_metadata:
          type: array
          items:
            $ref: "#/components/schemas/SourceMetadataEntry"
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    CreateManagerReportRequest:
      type: object
      additionalProperties: false
      required:
        - project_path
        - report_id
        - content_markdown
      properties:
        project_path:
          type: string
          minLength: 1
        report_id:
          type: string
          minLength: 1
        content_markdown:
          type: string
          minLength: 1
        baseline_ref:
          type:
            - string
            - "null"
        source_metadata:
          type: array
          items:
            $ref: "#/components/schemas/SourceMetadataEntry"
    ManagerReportListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ManagerReport"
    TaskWriteBulkCreateFields:
      type: object
      additionalProperties: false
      required:
        - candidate_task_spec
        - project_path
        - dependencies
        - verification_route
      properties:
        candidate_task_spec:
          type: string
          minLength: 1
        project_path:
          type: string
          minLength: 1
        dependencies:
          type: array
          items:
            type: string
            minLength: 1
        verification_route:
          type: string
          minLength: 1
    TaskWriteBulkDeleteFields:
      type: object
      additionalProperties: false
      required:
        - target_task_id
        - delete_reason
        - replacement
      properties:
        target_task_id:
          type: string
          minLength: 1
        delete_reason:
          type: string
          minLength: 1
        replacement:
          type:
            - string
            - "null"
    TaskWriteBulkEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - action
        - depends_on
        - reason
        - source
        - create
        - delete
      properties:
        id:
          type: string
          minLength: 1
        action:
          type: string
          enum:
            - Create
            - Delete
        depends_on:
          type: array
          items:
            type: string
            minLength: 1
        reason:
          type: string
          minLength: 1
        source:
          type: string
          minLength: 1
        create:
          oneOf:
