name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release-check:
    name: Release readiness
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.detect.outputs.has_changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup workspace with Playwright
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-playwright: "true"

      - name: Run root build contract
        run: pnpm build

      - name: Detect pending changesets
        id: detect
        shell: bash
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          pending=0
          for file in "${files[@]}"; do
            if [[ "$file" != ".changeset/README.md" ]]; then
              pending=1
              break
            fi
          done
          echo "has_changesets=$pending" >> "$GITHUB_OUTPUT"

  version-or-prepare-release:
    name: Version PR / release prep
    needs: release-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Create or update version PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm build && pnpm --filter @aim-ai/opencode-plugin run build && pnpm exec changeset publish --provenance
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
